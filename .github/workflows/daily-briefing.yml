name: Daily Briefing IA

on:
  schedule:
    # 03:00 UTC = 05:00 CEST — hors pic de queue GitHub Actions (05-06 UTC)
    # Avec ~1h de queue + ~30min de script → newsletter dispo ~06:30 CEST
    - cron: '0 3 * * *'
  workflow_dispatch:
    inputs:
      date:
        description: 'Date à générer (YYYY-MM-DD) — vide = aujourd''hui'
        required: false
        default: ''
      slug:
        description: 'Slug newsletter (vide = toutes les newsletters actives)'
        required: false
        default: ''

permissions:
  contents: write

jobs:
  generate-and-commit:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ hashFiles('**/requirements*.txt') }}-anthropic-feedparser-tavily-youtube
          restore-keys: pip-

      - name: Install dependencies
        run: pip install anthropic feedparser tavily-python youtube-transcript-api

      - name: Validate secrets
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
        run: |
          missing=""
          [ -z "$ANTHROPIC_API_KEY" ] && missing="$missing ANTHROPIC_API_KEY"
          [ -z "$TAVILY_API_KEY" ]    && missing="$missing TAVILY_API_KEY"
          if [ -n "$missing" ]; then
            echo "❌ Secrets manquants :$missing"
            exit 1
          fi
          echo "✅ Secrets présents"

      - name: Resolve active newsletter slugs
        id: slugs
        run: |
          if [ -n "${{ github.event.inputs.slug }}" ]; then
            echo "slugs=${{ github.event.inputs.slug }}" >> $GITHUB_OUTPUT
          else
            SLUGS=$(python3 -c "
          import json
          data = json.load(open('newsletters/index.json'))
          active = [n['slug'] for n in data['newsletters'] if n.get('status') == 'active']
          print(' '.join(active))
          ")
            echo "slugs=$SLUGS" >> $GITHUB_OUTPUT
          fi
          echo "Newsletters à traiter : $(cat $GITHUB_OUTPUT | grep slugs)"

      - name: Validate workflow files (all newsletters)
        run: |
          for slug in ${{ steps.slugs.outputs.slugs }}; do
            echo "--- Validation : $slug ---"
            python scripts/daily_briefing_workflow.py --slug "$slug" --validate-only
          done

      - name: Fetch backlog from RSS feeds (all newsletters)
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
        run: |
          for slug in ${{ steps.slugs.outputs.slugs }}; do
            echo "--- Fetch backlog : $slug ---"
            python scripts/fetch_backlog.py --slug "$slug"
          done

      - name: Generate daily briefings (all newsletters)
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          DATE_ARG=""
          if [ -n "${{ github.event.inputs.date }}" ]; then
            DATE_ARG="--date ${{ github.event.inputs.date }}"
          fi
          for slug in ${{ steps.slugs.outputs.slugs }}; do
            echo "--- Génération : $slug ---"
            python scripts/daily_briefing_workflow.py --slug "$slug" $DATE_ARG
          done

      - name: Update CHANGELOG
        run: |
          python3 - <<'EOF'
          from datetime import datetime, timezone
          date = datetime.now(timezone.utc).strftime("%Y-%m-%d")
          entry = f"## [{date}] — génération automatique\n\n- Édition du {date} générée et publiée (fetch RSS + Claude)\n\n---\n\n"
          path = "CHANGELOG.md"
          content = open(path, encoding="utf-8").read()
          # Ne pas dupliquer si l'entrée existe déjà (re-run manuel)
          if f"## [{date}]" not in content:
              content = content.replace("---\n\n", entry, 1)
              open(path, "w", encoding="utf-8").write(content)
              print(f"CHANGELOG mis à jour pour {date}")
          else:
              print(f"CHANGELOG : entrée {date} déjà présente, ignorée")
          EOF

      - name: Commit changes if any
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          # Ajouter les fichiers de toutes les newsletters actives dynamiquement
          python3 - <<'PYEOF'
          import json, subprocess, sys
          data = json.load(open("newsletters/index.json"))
          active = [n["slug"] for n in data["newsletters"] if n.get("status") == "active"]
          patterns = []
          for slug in active:
              base = f"newsletters/{slug}"
              patterns += [
                  f"{base}/data.js",
                  f"{base}/newsletters/*.md",
                  f"{base}/newsletters/*.html",
                  f"{base}/retour-*.json",
                  f"{base}/backlog.json",
                  f"{base}/historique.json",
                  f"{base}/feedback.json",
                  f"{base}/feedback_ui.json",
                  f"{base}/sources.json",
              ]
          patterns.append("CHANGELOG.md")
          # git add avec glob expansion
          for p in patterns:
              subprocess.run(["git", "add", "--", p], capture_output=True)
          result = subprocess.run(["git", "status", "--porcelain"], capture_output=True, text=True)
          if result.stdout.strip():
              import subprocess as sp
              from datetime import datetime, timezone
              date = datetime.now(timezone.utc).strftime("%Y-%m-%d")
              slugs_str = ", ".join(active)
              sp.run(["git", "commit", "-m", f"chore(briefing): génération quotidienne {date} [{slugs_str}]"], check=True)
              sp.run(["git", "push"], check=True)
              print(f"✅ Commit push pour {slugs_str}")
          else:
              print("Aucun changement à committer")
          PYEOF
