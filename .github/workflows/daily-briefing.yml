name: Daily Briefing IA

on:
  schedule:
    # 03:00 UTC = 05:00 CEST — hors pic de queue GitHub Actions (05-06 UTC)
    # Avec ~1h de queue + ~30min de script → newsletter dispo ~06:30 CEST
    - cron: '0 3 * * *'
  workflow_dispatch:
    inputs:
      date:
        description: 'Date à générer (YYYY-MM-DD) — vide = aujourd''hui'
        required: false
        default: ''

permissions:
  contents: write

jobs:
  generate-and-commit:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ hashFiles('**/requirements*.txt') }}-anthropic-feedparser-tavily-youtube
          restore-keys: pip-

      - name: Install dependencies
        run: pip install anthropic feedparser tavily-python youtube-transcript-api

      - name: Validate secrets
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
        run: |
          missing=""
          [ -z "$ANTHROPIC_API_KEY" ] && missing="$missing ANTHROPIC_API_KEY"
          [ -z "$TAVILY_API_KEY" ]    && missing="$missing TAVILY_API_KEY"
          if [ -n "$missing" ]; then
            echo "❌ Secrets manquants :$missing"
            exit 1
          fi
          echo "✅ Secrets présents"

      - name: Validate workflow files
        run: python scripts/daily_briefing_workflow.py --slug briefing-ia --validate-only

      - name: Fetch backlog from RSS feeds
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
        run: python scripts/fetch_backlog.py --slug briefing-ia

      - name: Generate daily briefing
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          DATE_ARG=""
          if [ -n "${{ github.event.inputs.date }}" ]; then
            DATE_ARG="--date ${{ github.event.inputs.date }}"
          fi
          python scripts/daily_briefing_workflow.py --slug briefing-ia $DATE_ARG

      - name: Update CHANGELOG
        run: |
          python3 - <<'EOF'
          from datetime import datetime, timezone
          date = datetime.now(timezone.utc).strftime("%Y-%m-%d")
          entry = f"## [{date}] — génération automatique\n\n- Édition du {date} générée et publiée (fetch RSS + Claude)\n\n---\n\n"
          path = "CHANGELOG.md"
          content = open(path, encoding="utf-8").read()
          # Ne pas dupliquer si l'entrée existe déjà (re-run manuel)
          if f"## [{date}]" not in content:
              content = content.replace("---\n\n", entry, 1)
              open(path, "w", encoding="utf-8").write(content)
              print(f"CHANGELOG mis à jour pour {date}")
          else:
              print(f"CHANGELOG : entrée {date} déjà présente, ignorée")
          EOF

      - name: Commit changes if any
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if [[ -n "$(git status --porcelain)" ]]; then
            git add newsletters/briefing-ia/data.js \
                    newsletters/briefing-ia/newsletters/*.md \
                    newsletters/briefing-ia/newsletters/*.html \
                    newsletters/briefing-ia/retour-*.json \
                    newsletters/briefing-ia/backlog.json \
                    newsletters/briefing-ia/historique.json \
                    newsletters/briefing-ia/feedback.json \
                    newsletters/briefing-ia/feedback_ui.json \
                    newsletters/briefing-ia/sources.json \
                    CHANGELOG.md
            git commit -m "chore(briefing): génération quotidienne $(date -u +%Y-%m-%d)"
            git push
          else
            echo "Aucun changement à committer"
          fi
