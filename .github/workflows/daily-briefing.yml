name: Daily Briefing

on:
  schedule:
    # 03:00 UTC = 05:00 CEST — hors pic de queue GitHub Actions (05-06 UTC)
    # Avec ~1h de queue + ~30min de script → newsletter dispo ~06:30 CEST
    - cron: '0 3 * * *'
  workflow_dispatch:
    inputs:
      slug:
        description: 'Slug newsletter (vide = toutes les newsletters actives)'
        required: false
        default: ''
      date:
        description: 'Date à générer (YYYY-MM-DD) — vide = aujourd''hui'
        required: false
        default: ''

permissions:
  contents: write

# ─── JOB 1 : résolution des slugs actifs ──────────────────────────────────────
jobs:
  setup:
    runs-on: ubuntu-latest
    outputs:
      slugs: ${{ steps.slugs.outputs.slugs }}
    steps:
      - uses: actions/checkout@v5

      - name: Validate secrets
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
        run: |
          missing=""
          [ -z "$ANTHROPIC_API_KEY" ] && missing="$missing ANTHROPIC_API_KEY"
          [ -z "$TAVILY_API_KEY" ]    && missing="$missing TAVILY_API_KEY"
          if [ -n "$missing" ]; then
            echo "❌ Secrets manquants :$missing"
            exit 1
          fi
          echo "✅ Secrets présents"

      - name: Resolve active newsletter slugs
        id: slugs
        run: |
          if [ -n "${{ github.event.inputs.slug }}" ]; then
            # Slug unique fourni manuellement
            echo 'slugs=["${{ github.event.inputs.slug }}"]' >> $GITHUB_OUTPUT
          else
            # Toutes les newsletters actives depuis index.json
            python3 -c "
          import json
          data = json.load(open('newsletters/index.json'))
          active = [n['slug'] for n in data['newsletters'] if n.get('status') == 'active']
          print('slugs=' + json.dumps(active))
          " >> $GITHUB_OUTPUT
          fi
          echo "Newsletters à traiter : $(grep slugs $GITHUB_OUTPUT)"

# ─── JOB 2 : génération par newsletter (parallèle, isolée) ────────────────────
  run:
    needs: setup
    runs-on: ubuntu-latest
    timeout-minutes: 60
    strategy:
      matrix:
        slug: ${{ fromJson(needs.setup.outputs.slugs) }}
      fail-fast: false    # ← une NL en erreur n'annule pas les autres

    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ hashFiles('**/requirements*.txt') }}-anthropic-feedparser-tavily
          restore-keys: pip-

      - name: Install dependencies
        run: pip install anthropic feedparser tavily-python youtube-transcript-api

      - name: Validate structure — ${{ matrix.slug }}
        run: python scripts/daily_briefing_workflow.py --slug "${{ matrix.slug }}" --validate-only

      - name: Fetch backlog — ${{ matrix.slug }}
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
        run: python scripts/fetch_backlog.py --slug "${{ matrix.slug }}"

      - name: Generate briefing — ${{ matrix.slug }}
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          DATE_ARG=""
          [ -n "${{ github.event.inputs.date }}" ] && DATE_ARG="--date ${{ github.event.inputs.date }}"
          python scripts/daily_briefing_workflow.py --slug "${{ matrix.slug }}" $DATE_ARG

      - name: Commit and push — ${{ matrix.slug }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          SLUG="${{ matrix.slug }}"
          BASE="newsletters/$SLUG"
          # Ajouter tous les fichiers propres à ce slug
          git add \
            "$BASE/data.js" \
            "$BASE/backlog.json" \
            "$BASE/historique.json" \
            "$BASE/feedback.json" \
            "$BASE/feedback_ui.json" \
            "$BASE/sources.json" \
            "$BASE/sources_rss.json" || true
          # Fichiers générés (newsletters/*.md, *.html)
          find "$BASE/newsletters" -name "*.md" -o -name "*.html" 2>/dev/null \
            | xargs git add -- 2>/dev/null || true
          # Rien à committer ?
          git diff --cached --quiet && echo "Aucun changement pour $SLUG" && exit 0
          DATE=$(date -u +%Y-%m-%d)
          git commit -m "chore(briefing): génération $DATE [$SLUG]"
          # Push avec retry + rebase en cas de push concurrent des autres slugs
          for attempt in 1 2 3; do
            git push && break
            echo "⚠ Push $attempt échoué — rebase et retry…"
            git pull --rebase origin ${{ github.ref_name }}
            sleep $((attempt * 3))
          done

# ─── JOB 3 : mise à jour CHANGELOG (après toutes les NL) ─────────────────────
  changelog:
    needs: run
    runs-on: ubuntu-latest
    if: always()    # tourne même si certains slugs ont échoué
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Update and commit CHANGELOG
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          # Récupérer les commits pushés par les jobs matrix AVANT de modifier
          git pull --rebase
          # Mettre à jour CHANGELOG.md
          python3 - <<'EOF'
          from datetime import datetime, timezone
          date = datetime.now(timezone.utc).strftime("%Y-%m-%d")
          entry = f"## [{date}] — génération automatique\n\n- Édition du {date} générée et publiée (fetch RSS + Claude)\n\n---\n\n"
          path = "CHANGELOG.md"
          content = open(path, encoding="utf-8").read()
          if f"## [{date}]" not in content:
              content = content.replace("---\n\n", entry, 1)
              open(path, "w", encoding="utf-8").write(content)
              print(f"CHANGELOG mis à jour pour {date}")
          else:
              print(f"CHANGELOG : entrée {date} déjà présente, ignorée")
          EOF
          git add CHANGELOG.md
          git diff --cached --quiet && echo "CHANGELOG inchangé" && exit 0
          git commit -m "chore(changelog): mise à jour $(date -u +%Y-%m-%d)"
          git push
