[build]
  # Le site statique est dans briefing-ia-phil/
  publish = "briefing-ia-phil"

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Cache-Control = "public, max-age=3600"

[[headers]]
  # data.js est servi à la racine du publish dir
  for = "/data.js"
  [headers.values]
    Cache-Control = "public, max-age=300"
