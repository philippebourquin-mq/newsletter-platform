[build]
  # On publie la racine pour conserver l'accès à /app.js
  publish = "."

[[redirects]]
  from = "/"
  to = "/briefing-ia-phil/"
  status = 301

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Cache-Control = "public, max-age=3600"

[[headers]]
  for = "/briefing-ia-phil/data.js"
  [headers.values]
    Cache-Control = "public, max-age=300"
