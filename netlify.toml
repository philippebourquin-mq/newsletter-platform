[build]
  # Le site est entièrement servi depuis briefing-ia-phil/
  publish = "briefing-ia-phil"

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Cache-Control = "public, max-age=3600"

[[headers]]
  for = "/data.js"
  [headers.values]
    Cache-Control = "public, max-age=300"
